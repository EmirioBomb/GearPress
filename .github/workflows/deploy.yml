name: deploy

on:
  # 每当 push 到 main 分支时触发部署
  # Deployment is triggered whenever a push is made to the main branch.
  push:
    branches: [main]
  # 手动触发部署
  # Manually trigger deployment
  workflow_dispatch:

jobs:
  docs:
    # if: false # 暂时禁用此工作流以避免意外部署
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          # “最近更新时间” 等 git 日志相关信息，需要拉取全部提交记录
          # "Last updated time" and other git log-related information require fetching all commit records.
          fetch-depth: 0

      # 安装 pnpm 以便后续安装依赖和构建项目
      # 该设置一定要放在 setup-node 之前，否则会导致无法找到 pnpm 的错误
      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      # 安装并设置 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          # 选择要使用的 node 版本
          node-version: 24

      # 安装依赖
      # Install dependencies
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # 运行构建脚本
      # Run the build script
      - name: Build VuePress site
        run: pnpm run docs:build

      # 查看 workflow 的文档来获取更多信息
      # @see https://github.com/crazy-max/ghaction-github-pages
      - name: Deploy to GitHub Pages
        uses: crazy-max/ghaction-github-pages@v5
        with:
          # 部署到 gh-pages 分支
          target_branch: gh-pages
          # 部署目录为 VuePress 的默认输出目录
          build_dir: docs/.vuepress/dist
        env:
          # @see https://docs.github.com/cn/actions/reference/authentication-in-a-workflow#about-the-github_token-secret
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
